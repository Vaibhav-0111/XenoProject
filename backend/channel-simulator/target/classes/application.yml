server:
  port: ${PORT:8081}

spring:
  application:
    name: channel-simulator

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  crm:
    base-url: ${CRM_CORE_URL:http://localhost:8080}

  simulation:
    # Delay range (seconds) before the FIRST status update (e.g. DELIVERED) fires
    min-delay-seconds: ${SIM_MIN_DELAY_SECONDS:1}
    max-delay-seconds: ${SIM_MAX_DELAY_SECONDS:10}

    # Probability (0-1) that a message fails outright instead of being delivered
    failure-rate: ${SIM_FAILURE_RATE:0.05}

    # Probability (0-1) that a delivered message is subsequently opened
    open-rate: ${SIM_OPEN_RATE:0.65}

    # Probability (0-1) that an opened message is subsequently clicked
    click-rate: ${SIM_CLICK_RATE:0.35}

    # Probability (0-1) that a clicked message results in a conversion
    conversion-rate: ${SIM_CONVERSION_RATE:0.20}

    # Max retry attempts for a failed callback POST to the CRM
    max-retries: ${SIM_MAX_RETRIES:3}

logging:
  level:
    com.xenoreach: INFO

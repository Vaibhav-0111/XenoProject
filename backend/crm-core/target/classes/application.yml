server:
  port: ${PORT:8080}

spring:
  application:
    name: crm-core

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/xenoreach}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ---- App-specific config ----
app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-min-32-chars-long-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h
    issuer: xenoreach-ai

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

  channel-simulator:
    base-url: ${CHANNEL_SIMULATOR_URL:http://localhost:8081}

  ai:
    provider: ${AI_PROVIDER:gemini}        # gemini | openai | mock
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      base-url: https://generativelanguage.googleapis.com/v1beta
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: https://api.openai.com/v1

  firebase:
    enabled: ${FIREBASE_ENABLED:true}
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}

logging:
  level:
    com.xenoreach: INFO
    org.springframework.security: INFO

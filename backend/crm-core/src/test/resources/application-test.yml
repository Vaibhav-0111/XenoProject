spring:
  datasource:
    url: jdbc:h2:mem:xenoreach;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-min-32-characters
    expiration-ms: 3600000
    issuer: xenoreach-ai-test
  firebase:
    enabled: false
  ai:
    provider: mock
